server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # In production, the frontend calls the backend directly via VITE_API_URL.
        # This block is here for local Docker Compose routing if needed.
        return 404;
    }
}
